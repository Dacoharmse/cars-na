name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          cp ecosystem.config.js .next/standalone/
          tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: standalone.tar.gz
          retention-days: 7

      - name: Setup SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        timeout-minutes: 5
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
        run: |
          SSH="ssh -T -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=3"
          scp -i ~/.ssh/deploy_key standalone.tar.gz "${VPS_USERNAME}@${VPS_HOST}:/var/www/cars-na/standalone.tar.gz"
          $SSH "${VPS_USERNAME}@${VPS_HOST}" '
            set -e
            cd /var/www/cars-na
            echo "==> Backing up .env..."
            cp .next/standalone/.env /tmp/cars-na-env.bak 2>/dev/null || true
            echo "==> Extracting new build..."
            rm -rf .next/standalone.new
            mkdir -p .next/standalone.new logs
            tar -xzf standalone.tar.gz -C .next/standalone.new
            rm standalone.tar.gz
            echo "==> Restoring .env..."
            cp /tmp/cars-na-env.bak .next/standalone.new/.env
            echo "==> Syncing migrations from git..."
            cd /home/carsna/htdocs/cars.na/cars-na
            git pull origin master --quiet
            echo "==> Running DB migrations..."
            timeout 60 npx prisma migrate deploy || echo "Warning: no pending migrations"
            echo "==> Swapping build..."
            cd /var/www/cars-na
            rm -rf .next/standalone.old
            mv .next/standalone .next/standalone.old
            mv .next/standalone.new .next/standalone
            rm -rf .next/standalone.old
            echo "==> Restarting app..."
            pm2 restart cars-na 2>/dev/null || pkill -f "node.*standalon[e]/server.js" 2>/dev/null || true
            echo "==> Deploy complete!"
          '

      - name: Health check
        timeout-minutes: 3
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USERNAME: ${{ secrets.VPS_USERNAME }}
        run: |
          SSH="ssh -T -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=15"
          echo "Waiting for application to start..."
          sleep 15
          for i in {1..12}; do
            if $SSH "${VPS_USERNAME}@${VPS_HOST}" "curl -sf --max-time 8 http://localhost:3000 -o /dev/null"; then
              echo "Application is responding on port 3000"
              exit 0
            fi
            echo "Attempt $i/12: not ready yet, waiting 5s..."
            sleep 5
          done
          echo "Health check failed - last PM2 logs:"
          $SSH "${VPS_USERNAME}@${VPS_HOST}" "pm2 logs cars-na --lines 30 --nostream; cat /tmp/pm2-deploy.log 2>/dev/null || true"
          exit 1
