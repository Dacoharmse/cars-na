name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: standalone.tar.gz
          retention-days: 7

      - name: Show download instructions
        run: |
          echo "=========================================="
          echo "BUILD SUCCESSFUL!"
          echo "=========================================="
          echo ""
          echo "To deploy manually on your VPS:"
          echo ""
          echo "1. Download the artifact from GitHub Actions"
          echo "2. Upload to VPS: scp standalone.tar.gz root@45.8.226.60:/var/www/cars-na/"
          echo "3. On VPS run:"
          echo "   cd /var/www/cars-na"
          echo "   mkdir -p .next/standalone"
          echo "   tar -xzf standalone.tar.gz -C .next/standalone"
          echo "   cp .env .next/standalone/.env"
          echo "   pm2 restart cars-na || pm2 start .next/standalone/server.js --name cars-na"
          echo "=========================================="
