name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          cp ecosystem.config.js .next/standalone/
          tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: standalone.tar.gz
          retention-days: 7

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Copy artifact to VPS
          scp -i ~/.ssh/deploy_key standalone.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/cars-na/standalone.tar.gz

          ssh -i ~/.ssh/deploy_key -o ServerAliveInterval=10 -o ServerAliveCountMax=6 ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            set -e
            cd /var/www/cars-na

            echo '==> Backing up current .env...'
            cp .next/standalone/.env /tmp/cars-na-env.bak 2>/dev/null || true

            echo '==> Extracting new build...'
            rm -rf .next/standalone.new
            mkdir -p .next/standalone.new logs
            tar -xzf standalone.tar.gz -C .next/standalone.new
            rm standalone.tar.gz

            echo '==> Restoring .env from server...'
            cp /tmp/cars-na-env.bak .next/standalone.new/.env

            echo '==> Syncing migrations from git...'
            cd /home/carsna/htdocs/cars.na/cars-na
            git pull origin master --quiet

            echo '==> Running DB migrations...'
            timeout 60 npx prisma migrate deploy || echo 'Warning: migrate deploy timed out or had no pending migrations'

            echo '==> Swapping build...'
            cd /var/www/cars-na
            rm -rf .next/standalone.old
            mv .next/standalone .next/standalone.old
            mv .next/standalone.new .next/standalone

            echo '==> Reloading PM2 with new config...'
            timeout 35 pm2 restart cars-na --update-env 2>/dev/null || timeout 35 pm2 start .next/standalone/ecosystem.config.js --env production 2>/dev/null || true
            timeout 10 pm2 save --force || true

            echo '==> Cleaning up old build...'
            rm -rf .next/standalone.old

            echo 'Deployment complete!'
          "

      - name: Health check
        run: |
          echo "Waiting for application to start..."
          sleep 10
          for i in {1..12}; do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "curl -f http://localhost:3000 -o /dev/null -s"; then
              echo "✓ Application is responding on port 3000"
              ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "pm2 status"
              exit 0
            fi
            echo "Attempt $i/12: Application not ready yet, waiting..."
            sleep 5
          done
          echo "✗ Health check failed"
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "pm2 logs cars-na --lines 50 --nostream"
          exit 1
