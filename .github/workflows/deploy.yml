name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          cp ecosystem.config.js .next/standalone/
          tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: standalone.tar.gz
          retention-days: 7

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create directory on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "mkdir -p /var/www/cars-na"

      - name: Copy artifact to VPS
        run: |
          scp -i ~/.ssh/deploy_key standalone.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/cars-na/standalone.tar.gz

      - name: Create .env file on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "cat > /var/www/cars-na/.env.tmp << 'EOF'
          DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"
          NEXTAUTH_SECRET=\"${{ secrets.NEXTAUTH_SECRET }}\"
          NEXTAUTH_URL=\"${{ secrets.NEXTAUTH_URL }}\"
          SMTP_HOST=\"${{ secrets.SMTP_HOST }}\"
          SMTP_PORT=\"${{ secrets.SMTP_PORT }}\"
          SMTP_SECURE=\"${{ secrets.SMTP_SECURE }}\"
          SMTP_USER=\"${{ secrets.SMTP_USER }}\"
          SMTP_PASS=\"${{ secrets.SMTP_PASS }}\"
          SMTP_FROM=\"${{ secrets.SMTP_FROM }}\"
          EOF
          "

      - name: Extract and restart on VPS
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "
            cd /var/www/cars-na &&
            rm -rf .next/standalone &&
            mkdir -p .next/standalone logs &&
            tar -xzf standalone.tar.gz -C .next/standalone &&
            rm standalone.tar.gz &&
            mv .env.tmp .next/standalone/.env &&
            pm2 delete cars-na 2>/dev/null || true &&
            pm2 start .next/standalone/ecosystem.config.js &&
            pm2 save &&
            echo 'Deployment complete!'
          "

      - name: Health check
        run: |
          echo "Waiting for application to start..."
          sleep 10
          for i in {1..12}; do
            if ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "curl -f http://localhost:3000 -o /dev/null -s"; then
              echo "✓ Application is responding on port 3000"
              ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "pm2 status"
              exit 0
            fi
            echo "Attempt $i/12: Application not ready yet, waiting..."
            sleep 5
          done
          echo "✗ Health check failed: Application did not respond within 60 seconds"
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} "pm2 logs cars-na --lines 50 --nostream"
          exit 1
