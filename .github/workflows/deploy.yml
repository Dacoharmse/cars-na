name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npx next build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Prepare standalone package
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          tar -czf standalone.tar.gz -C .next/standalone .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: standalone-build
          path: standalone.tar.gz
          retention-days: 7

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          # Copy artifact to VPS
          scp -i ~/.ssh/deploy_key standalone.tar.gz ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }}:/var/www/cars-na/

          # Extract and restart on VPS
          ssh -i ~/.ssh/deploy_key ${{ secrets.VPS_USERNAME }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
            cd /var/www/cars-na

            # Pull latest code
            git pull origin master

            # Extract new build
            mkdir -p .next/standalone
            tar -xzf standalone.tar.gz -C .next/standalone
            rm standalone.tar.gz

            # Copy environment file
            cp .env .next/standalone/.env 2>/dev/null || true

            # Restart application
            pm2 restart cars-na || pm2 start .next/standalone/server.js --name cars-na
            pm2 save

            echo "Deployment complete!"
          ENDSSH
